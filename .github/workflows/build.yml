name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-1-21-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Fetch compile-only libs
        working-directory: v1.21.1
        run: bash ./scripts/ci-setup-libs.sh

      - name: Build mod (1.21.1)
        working-directory: v1.21.1
        run: |
          chmod +x gradlew
          ./gradlew build --stacktrace

      - name: Upload jar (1.21.1)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lootpiles-1.21.1-jar
          path: v1.21.1/build/libs/!(*-@(dev|sources|javadoc)).jar

  build-1-20-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Fetch compile-only libs
        working-directory: v1.20.1
        run: bash ./scripts/ci-setup-libs.sh

      - name: Build mod (1.20.1)
        working-directory: v1.20.1
        run: |
          chmod +x gradlew
          ./gradlew build --stacktrace

      - name: Upload jar (1.20.1)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lootpiles-1.20.1-jar
          path: v1.20.1/build/libs/!(*-@(dev|sources|javadoc)).jar
